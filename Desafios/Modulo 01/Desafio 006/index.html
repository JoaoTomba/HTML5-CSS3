<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das Tags</title>
</head>
<body>
   <h1>Tags em HTML5</h1>
   <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag usar em cada caso</p>
   <ul>
    <li><abbr title="Use a tag <p>">Paragrafo</abbr></li>
    <li><abbr title="Use de H1 a H6">Titulos</abbr></li>
    <li><abbr title="Use <img>">Imagens</abbr></li>
    <li><abbr title="Use <abbr>">Abreviacoes</abbr></li>
    <li><abbr title="Use <code> ou <pre>+<code>">Codigo-fonte</abbr></li>
    <li><abbr title="Use <ol> com <li>">Listas numeradas</abbr></li>
    <li><abbr title="Use <ul> com <li>">Listas com demarcadores</abbr></li>
   </ul> 
</body>
</html>
