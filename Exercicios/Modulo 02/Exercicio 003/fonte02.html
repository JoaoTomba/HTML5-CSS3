<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>/*Fonteface e regra pra colocar fonte externa*/
        @font-face {
            font-family: 'love';
            src: url(Fonts/love\ larry\ ttf.ttf) format('opentype');
            font-weight: normal;
            font-style: nromal;
            /*Tipos de formato
                - opentype(otf)
                - truetype(ttf)
                - embedded-opentype
                - truetype-aat(Apple advenced Typography)*/
                
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
        /*Site dafont.com*/
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Magni reiciendis veniam deleniti possimus expedita, eum, ut omnis labore fugiat hic accusantium quia quis vel distinctio maxime impedit voluptatum. Corrupti, dicta!</p>
</body>
</html>
