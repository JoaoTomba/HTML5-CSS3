<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinamica</h1>
    <p>tente abrir esse site em varios dispositivos ou diminua o tamanho do navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem Flexivel">
    </picture>
    <!-- tem q ser na ordem da maior pra menor -->
     <h1>Audios</h1>
     <p>Colocar audio</p>
     <audio src="midia/happy-mistake.mp3" controls ></audio>
     <!-- MP3 WAV OGG -->
      <audio preload="metadata" autoplay controls loop>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <source src="midia/guanacast-33.wav" type="audio/wav">
        <!-- evitar wav pq sao muito pesados -->
        <p>Infelixmente seu navegador nao consegue reproduzir auidio <a href="midia/guanacast-33.mp3" download="">clique aqi para baixar o arquivo mp3</a></p>
      </audio> 
</body>
</html>
